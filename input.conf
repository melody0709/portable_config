# uosc + mpv 快捷键配置文件
# 语法说明: 快捷键  命令  井号叹号 菜单名称
# 井号叹号开头的注释会显示在 uosc 右键菜单中
# 大于号用于创建子菜单

# ============================================
# IPTV 控制 (可在 input.conf 中自定义快捷键)
# ============================================
# F8: 显示 IPTV 选台菜单 (分组 > 频道 > EPG)
F8  script-binding epg/show-iptv-menu       #! IPTV 选台菜单
# F9: 显示 EPG 回看搜索菜单
F9  script-binding epg/show-epg-search-menu #! EPG 回看搜索
# Shift+F9: 强制刷新 EPG 数据（忽略缓存）
Shift+F9  script-binding epg/force-refresh-epg #! 强制刷新 EPG
# 鼠标右键: 显示 IPTV 选台菜单
MBTN_RIGHT  script-binding epg/show-iptv-menu #! IPTV 选台菜单

# ============================================
# 基础控制
# ============================================
# 按下 alt+r  重置所有常用参数
alt+r set speed 1.0; set gamma 0; set brightness 0; set contrast 0; set saturation 0; set hue 0; set video-pan-x 0; set video-pan-y 0; set video-zoom 0; show-text "所有设置已重置" #!  重置画面所有参数 

# 播放控制
q  multiply speed 1/1.1                   # 播放减速
e  multiply speed 1.1                     # 播放加速
w  set speed 1.0                          # 播放重置速度

# 大小控制
F1  set window-scale  0.75    
F2  set window-scale  1    
F3  set window-scale  1.5    
F4  set window-scale  2   

# 方向键控制（左右退/进 5秒，上下退/进 60秒）
# 默认情况下：LEFT 是 seek -5, RIGHT 是 seek 5
# 如果你想反向（即左进右退），修改如下：
LEFT  seek -5      # 按左键：快进 
RIGHT seek 5      # 按右键：后退 
UP    seek 20     # 按上键：后退 
DOWN  seek -20      # 按下键：快进 


